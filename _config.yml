  Bio: 
  During my career so far, I have gained experience in developing and validating acoustic testing methods for both R&D and QA teams in the medical device and consumer electronics industries.
  Additionally, I have experience conducting independent academic research in the field of hearing science, where my work consisted of devising and carrying out experiments to asses performance of an open-source hearing aid platform.
  I have an interest and passion for the overlap between the fields of engineering acoustics and hearing science, and am always interested in learning about opportunities in these areas.
  Some examples of my work in each of these areas can be seen on this page.
  <br>
  Currently interning at Bose Corporation in Massachusetts
